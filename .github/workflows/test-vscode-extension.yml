name: Test VS Code Extension

on:
  pull_request:
    paths:
      - "src/workflow.js"
      - "vscode-extension/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/test-vscode-extension.yml"
  push:
    branches:
      - main
    paths:
      - "src/workflow.js"
      - "vscode-extension/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/test-vscode-extension.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run repository tests
        run: pnpm test

      - name: Build web application
        run: pnpm run build

      - name: Build VS Code extension
        run: pnpm run vscode:build

      - name: Run Extension Host tests
        run: xvfb-run -a pnpm run vscode:test:integration

      - name: Package VSIX
        run: pnpm run vscode:package

      - name: Inspect VSIX contents
        run: pnpm --dir vscode-extension exec vsce ls --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: timeline-workflow-preview-vsix
          path: vscode-extension/*.vsix
          if-no-files-found: error
